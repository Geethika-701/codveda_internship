<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeWave</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom Styling -->
  <style>
    :root {
      --primary: #6f42c1;
      --secondary: #0d1b2a;
    }

    body {
      font-family: Arial;
    }

    /* Navbar */
    .navbar {
      background-color: var(--secondary) !important;
    }

    .navbar-brand {
      color: white !important;
      font-weight: bold;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #6f42c1, #9d4edd);
      color: white;
      padding: 80px 20px;
      text-align: center;
    }

    .btn-custom {
      background-color: var(--primary);
      color: white;
      border: none;
    }

    .btn-custom:hover {
      background-color: #5a32a3;
    }

    /* Cards */
    .card {
      border: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Footer */
    footer {
      background-color: var(--secondary);
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand">CodeWave</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>Build Smart Websites</h1>
  <p>Modern UI with powerful customization</p>
  <button class="btn btn-custom">Get Started</button>
</section>

<!-- Features -->
<div class="container mt-5">
  <div class="row text-center">

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Custom Design</h5>
        <p>Tailored UI for your brand</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Responsive</h5>
        <p>Works on all devices</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Modern UI</h5>
        <p>Clean and elegant interface</p>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer>
  <p>© 2026 CodeWave</p>
</footer>

</body>
</html>
