<!DOCTYPE html>
<html>
<head>
  <title>Advanced Animations</title>

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:#fff;
      text-align:center;
    }

    section{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    h1{
      font-size:40px;
      opacity:0;
    }

    .box{
      width:100px;
      height:100px;
      background:red;
      margin:20px;
      opacity:0;
    }

    button{
      padding:10px 20px;
      border:none;
      background:blue;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:orange;
    }
  </style>
</head>

<body>

<!-- SECTION 1 -->
<section>
  <h1 id="title">Welcome Animation</h1>
  <div class="box"></div>
</section>

<!-- SECTION 2 -->
<section>
  <h1 class="scroll-text">Scroll Animation</h1>
  <div class="box"></div>
</section>

<!-- INTERACTIVE -->
<section>
  <button id="animateBtn">Click Animation</button>
  <div class="box" id="clickBox"></div>
</section>

<script>

  // 🔥 GSAP plugin
  gsap.registerPlugin(ScrollTrigger);

  // 🔥 Timeline Animation (Requirement)
  const tl = gsap.timeline();

  tl.to("#title", {
    opacity:1,
    y:-20,
    duration:1
  })
  .to(".box", {
    opacity:1,
    scale:1.2,
    duration:1
  });

  // 🔥 Scroll Animation (Requirement)
  gsap.to(".scroll-text", {
    scrollTrigger: {
      trigger: ".scroll-text",
      start: "top 80%"
    },
    opacity:1,
    y:-50,
    duration:1
  });

  // 🔥 Interactive Click Animation
  document.getElementById("animateBtn").onclick = function(){
    gsap.to("#clickBox", {
      x:200,
      rotation:360,
      duration:1
    });
  };

</script>

</body>
</html>
